<svg width="100%" viewBox="0 0 120 126" xmlns="http://www.w3.org/2000/svg">
  <!-- Clock circle -->
  <circle cx="60" cy="60" r="56" fill="#1a1a2e" stroke="#534AB7" stroke-width="3" style="fill:rgb(26, 26, 46);stroke:rgb(83, 74, 183);color:rgb(251, 251, 254);stroke-width:3px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
  <circle cx="60" cy="60" r="50" fill="none" stroke="#3C3489" stroke-width="1" stroke-dasharray="3 2.5" style="fill:none;stroke:rgb(60, 52, 137);color:rgb(251, 251, 254);stroke-width:1px;stroke-dasharray:3px, 2.5px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

  <!-- Tick marks -->
  <g stroke="#AFA9EC" stroke-width="2" stroke-linecap="round" style="fill:rgb(0, 0, 0);stroke:rgb(175, 169, 236);color:rgb(251, 251, 254);stroke-width:2px;stroke-linecap:round;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto">
    <line x1="60" y1="10" x2="60" y2="18" style="fill:rgb(0, 0, 0);stroke:rgb(175, 169, 236);color:rgb(251, 251, 254);stroke-width:2px;stroke-linecap:round;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
    <line x1="60" y1="102" x2="60" y2="110" style="fill:rgb(0, 0, 0);stroke:rgb(175, 169, 236);color:rgb(251, 251, 254);stroke-width:2px;stroke-linecap:round;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
    <line x1="10" y1="60" x2="18" y2="60" style="fill:rgb(0, 0, 0);stroke:rgb(175, 169, 236);color:rgb(251, 251, 254);stroke-width:2px;stroke-linecap:round;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
    <line x1="102" y1="60" x2="110" y2="60" style="fill:rgb(0, 0, 0);stroke:rgb(175, 169, 236);color:rgb(251, 251, 254);stroke-width:2px;stroke-linecap:round;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
  </g>

  <!-- Hour hand (~10 o'clock) -->
  <line x1="60" y1="60" x2="36" y2="34" stroke="#EEEDFE" stroke-width="4" stroke-linecap="round" style="fill:rgb(0, 0, 0);stroke:rgb(238, 237, 254);color:rgb(251, 251, 254);stroke-width:4px;stroke-linecap:round;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
  <!-- Minute hand (~12) -->
  <line x1="60" y1="60" x2="66" y2="18" stroke="#7F77DD" stroke-width="3" stroke-linecap="round" style="fill:rgb(0, 0, 0);stroke:rgb(127, 119, 221);color:rgb(251, 251, 254);stroke-width:3px;stroke-linecap:round;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
  <!-- Second hand (pointing to ~2 o'clock, away from initials) -->
  <line x1="60" y1="60" x2="90" y2="32" stroke="#D85A30" stroke-width="1.5" stroke-linecap="round" style="fill:rgb(0, 0, 0);stroke:rgb(216, 90, 48);color:rgb(251, 251, 254);stroke-width:1.5px;stroke-linecap:round;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

  <!-- Center dot -->
  <circle cx="60" cy="60" r="4.5" fill="#EEEDFE" style="fill:rgb(238, 237, 254);stroke:none;color:rgb(251, 251, 254);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
  <circle cx="60" cy="60" r="2" fill="#7F77DD" style="fill:rgb(127, 119, 221);stroke:none;color:rgb(251, 251, 254);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

  <!-- "GC" text at bottom of clock -->
  <text x="60" y="88" text-anchor="middle" font-family="Georgia, serif" font-size="16" font-weight="700" fill="#AFA9EC" letter-spacing="2" style="fill:rgb(175, 169, 236);stroke:none;color:rgb(251, 251, 254);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:Georgia, serif;font-size:16px;font-weight:700;text-anchor:middle;dominant-baseline:auto">GC</text>
</svg>