<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GCSE Exam Countdowns 2026</title>
    <link rel="icon" type="image/x-icon" href="/gcse_favicon.svg">
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <div class="container">
        <header>
            <div class="header-top">
                <div>
                    <div class="tag">2026 Exam Season</div>
                    <h1>GCSE <span>Countdown</span></h1>
                </div>
                <div class="live-clock">
                    <span>Current Date/Time</span>
                    <span class="time" id="clock">DD/MM/YYYY | --:--:--</span>
                    
                </div>
            </div>
            <div class="legend">
                <div class="legend-item">
                    <div class="legend-swatch" style="background:linear-gradient(to right,#22c55e,#eab308,#ef4444)"></div>
                    <span>Bar: full green = 100+ days · empty = exam start</span>
                </div>
                <div class="legend-item">
                    <div class="legend-dot" style="border-color:#a855f7"></div>
                    <span>In Progress</span>
                </div>
                <div class="legend-item">
                    <div class="legend-dot" style="border-color:#3b82f6"></div>
                    <span>Exam Over</span>
                </div>
            </div>
        </header>
        
        <div class="controls">
            <div class="controls-topbar">
                <div class="controls-topbar-left">
                    <span class="controls-label" style="margin-bottom:0">Filter by Subject</span>
                    <span class="filter-count" id="filterCount"></span>
                </div>
                <button class="compact-btn" id="compactBtn">Compact</button>
            </div>
            
            <div id="filterCategories"></div>
            
            <div class="clear-btn-wrap" id="clearBtnWrap">
                <button id="clearFilters" class="filter-btn red-btn">✕ Clear Filters</button>
            </div>
        </div>
        
        <div class="count-info" id="countInfo"></div>
        <div class="exam-list" id="examList"></div>
        <div class="empty-state" id="emptyState">No exams found for this filter.</div>
        <script src="js/indexScript.js"></script>
    </div>
</body>
</html>
